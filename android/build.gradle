plugins {
    id 'com.android.application'
}

android {
    namespace 'com.bliaik.prune'
    compileSdk 35

    defaultConfig {
        applicationId "com.bliaik.prune"
        minSdk 26
        targetSdk 35
        versionCode 1
        versionName "0.1.0"
    }
}

dependencies {
    implementation 'androidx.core:core:1.12.0'
    testImplementation 'junit:junit:4.13.2'
}
